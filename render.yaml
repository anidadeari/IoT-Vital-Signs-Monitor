services:
  - type: web
    name: iot-vital-signs-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLAMA32_CLOUD_FALLBACK
        value: "true"
      - key: LLAMA32_CLOUD_MODEL
        value: openai/gpt-oss-20b
      - key: PREDICTION_TIMEOUT_SECONDS
        value: "30"
